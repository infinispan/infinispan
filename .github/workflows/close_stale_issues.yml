name: 'Close stale issues'
on:
  schedule:
    - cron: '30 1 * * *'

permissions:
  contents: read
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          any-of-labels: 'kind/flaky test'
          days-before-close: 14
