name: Pull Request Open

on:
  pull_request_target:
    types:
      - opened
      - reopened

jobs:
  targetlabel:
    runs-on: ubuntu-latest
    steps:
      - name: Add target label
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if [ "$BASE_REF" = "main" ]; then
            echo "Skipping target label for main branch"
            exit 0
          fi
          TARGET="target/${BASE_REF}"
          if ! gh api "repos/${GH_REPO}/labels" -q '.[].name' --paginate | grep -qxF "$TARGET"; then
            gh label create "$TARGET" --color "0052CC" --repo "$GH_REPO"
          fi
          gh pr edit "$PR_NUMBER" --add-label "$TARGET" --repo "$GH_REPO"
          PREFIX="[${BASE_REF}]"
          if [[ "$PR_TITLE" != "${PREFIX}"* ]]; then
            gh pr edit "$PR_NUMBER" --title "${PREFIX} ${PR_TITLE}" --repo "$GH_REPO"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
